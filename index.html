<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Budol Store Inventory</title>

<style>
body{
    font-family: Arial;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

.stock-high{
    color:green;
}

.stock-low{
    color:orange;
}

.stock-out{
    color:red;
}
</style>

</head>

<body>

<h1>Budol Store Inventory</h1>

<div class="products" id="products"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2vomR0V76PUzdxQj4tTyCH4ZSsVjkbrBlBr3VpyJ12uLiauFkEe1AoV-hSfZUC6hrLtLseUJrDT7u/pub?output=csv";

Papa.parse(SHEET_URL,{
    download:true,
    header:true,

    complete:function(results){

        let html="";

        results.data.forEach(item=>{

            let stockClass="";
            let stockText="";

            let qty=parseInt(item.Quantity);

            if(qty===0){
                stockClass="stock-out";
                stockText="Out of Stock";
            }
            else if(qty<=5){
                stockClass="stock-low";
                stockText=`Only ${qty} left`;
            }
            else{
                stockClass="stock-high";
                stockText=`${qty} available`;
            }

            html += `
                <div class="card">
                <img src="${item.Image}">
                <h3>${item.Product}</h3>
                <p>Price: ${item.Price} DKK</p>
                <p class="${stockClass}">${stockText}</p>
            </div>`;
        });

        document.getElementById("products").innerHTML = html;
    }
});

</script>

</body>
</html>
